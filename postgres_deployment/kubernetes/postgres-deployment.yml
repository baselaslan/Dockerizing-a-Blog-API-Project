apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    name: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-app
  template:
    metadata:
      labels:
        app: postgres-app
    spec:
      containers:
      - name: postgres
        image: postgres:13.1-alpine
        imagePullPolicy: "IfNotPresent"
        ports:
         - containerPort: 5432
        envFrom:
         - configMapRef:
             name: postgres-config
        env:
          # - name: POSTGRES_USER
          #   valueFrom:
          #     secretKeyRef:
          #       name: postgres-credentials
          #       key: user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
        volumeMounts:
          - name: postgresdb
            mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgresdb
        persistentVolumeClaim:
          claimName: postgres-pvc
